name: CI — DevOps Sandbox Platform

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install Python deps
        run: pip install flask==3.0.3 werkzeug==3.0.3

      - name: Validate Python syntax
        run: python -m py_compile platform/api.py app/app.py

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "."
          severity: warning
          ignore_paths: ".git"

      - name: Validate Nginx config syntax
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "${{ github.workspace }}/nginx/conf.d:/etc/nginx/conf.d:ro" \
            nginx:1.25-alpine nginx -t

      - name: Validate docker-compose syntax
        run: docker compose config --quiet

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sandbox-app image
        run: docker build -t sandbox-app:latest -f Dockerfile.app .

      - name: Build API image
        run: docker build -t sandbox-api:latest -f Dockerfile.api .

      - name: Smoke test — app container starts and /health responds
        run: |
          docker run -d --name test-app -p 15000:5000 \
            -e ENV_ID=test-001 -e ENV_NAME=ci-test \
            sandbox-app:latest
          sleep 3
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:15000/health)
          echo "Health check returned: $HTTP"
          [ "$HTTP" = "200" ] || (docker logs test-app && exit 1)
          docker rm -f test-app
