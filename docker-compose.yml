# DevOps Sandbox Platform — core infrastructure
# Sandbox app containers are created dynamically by create_env.sh

networks:
  sandbox-mgmt:
    name: sandbox-mgmt
    driver: bridge

services:
  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sandbox-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d
    networks:
      - sandbox-mgmt
    labels:
      - "sandbox.managed=true"
      - "sandbox.role=nginx"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Control API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sandbox-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./platform:/app/platform
      - ./envs:/app/envs
      - ./logs:/app/logs
      - ./nginx/conf.d:/app/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - API_PORT=${API_PORT:-8080}
      - NGINX_CONTAINER=sandbox-nginx
      - APP_IMAGE=${APP_IMAGE:-sandbox-app:latest}
    env_file:
      - .env
    networks:
      - sandbox-mgmt
    labels:
      - "sandbox.managed=true"
      - "sandbox.role=api"
    depends_on:
      - nginx

  # ── Cleanup daemon ───────────────────────────────────────────────────────
  daemon:
    image: python:3.11-slim
    container_name: sandbox-daemon
    restart: unless-stopped
    volumes:
      - ./platform:/app/platform
      - ./envs:/app/envs
      - ./logs:/app/logs
      - ./nginx/conf.d:/app/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq docker.io curl &&
               bash /app/platform/cleanup_daemon.sh"
    environment:
      - NGINX_CONTAINER=sandbox-nginx
    env_file:
      - .env
    networks:
      - sandbox-mgmt
    labels:
      - "sandbox.managed=true"
      - "sandbox.role=daemon"

  # ── Health poller ────────────────────────────────────────────────────────
  monitor:
    image: python:3.11-slim
    container_name: sandbox-monitor
    restart: unless-stopped
    volumes:
      - ./monitor:/app/monitor
      - ./envs:/app/envs
      - ./logs:/app/logs
    working_dir: /app
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq curl &&
               bash /app/monitor/health_poller.sh"
    env_file:
      - .env
    networks:
      - sandbox-mgmt
    labels:
      - "sandbox.managed=true"
      - "sandbox.role=monitor"
